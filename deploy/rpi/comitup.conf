# Comitup config for LabelJetty — WiFi onboarding.
#
# Behaviour: on boot Comitup tries known WiFi networks. If none are reachable it raises its
# own access point named below and serves a captive portal (default http://10.41.0.1) to
# pick and authenticate the real network. Once connected it runs as a normal WiFi client;
# the AP only returns if connectivity is lost. See http://davesteele.github.io/comitup/.
#
# Only the well-known keys are set here; everything else uses Comitup defaults. Check the
# upstream comitup.conf for the full, version-specific option list before relying on more.

# The setup hotspot SSID. "<nnnn>" is replaced by Comitup with a per-device suffix.
ap_name: LabelJetty-<nnnn>

# Optional: lock the setup AP with a WPA2 passphrase (min 8 chars). Leave commented for an
# open setup network (simpler onboarding on a trusted/home setting).
# ap_password: changeme123
